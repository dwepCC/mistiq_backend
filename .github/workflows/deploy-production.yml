name: Deploy Production

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      skip_migrate:
        description: "Omitir migrate"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_SHA: ghcr.io/${{ github.repository }}:latest
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_SHA
          script_stop: true
          script: |
            set -euo pipefail

            cd /opt/tukifac

            mkdir -p .deploy

            echo "Login GHCR..."
            echo "${{ secrets.VPS_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            PREV=$(grep '^TUKIFAC_IMAGE=' .env | cut -d= -f2- || true)

            if [ -n "$PREV" ]; then
              echo "$PREV" > .deploy/previous-image
            fi

            echo "Updating image..."
            sed -i "s|^TUKIFAC_IMAGE=.*|TUKIFAC_IMAGE=${IMAGE_SHA}|" .env

            echo "Pulling image..."
            docker compose -f docker-compose.production.yml pull backend-go

            echo "Restarting container..."
            docker compose -f docker-compose.production.yml up -d --no-deps --force-recreate backend-go

            echo "Waiting for backend..."

            MAX_ATTEMPTS=30
            ATTEMPT=1

            until [ $ATTEMPT -gt $MAX_ATTEMPTS ]
            do
              if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
                echo "Backend is healthy"
                break
              fi

              echo "Backend not ready... ($ATTEMPT/$MAX_ATTEMPTS)"
              sleep 5
              ATTEMPT=$((ATTEMPT+1))
            done

            if [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
              echo "Backend failed to start"

              echo "Container logs:"
              docker logs tukifac-backend-go --tail 100

              exit 1
            fi

            echo "Running migrations..."
            docker exec tukifac-backend-go ./tukifac-api migrate || true

            echo "Final health check..."
            curl -fsS http://127.0.0.1:3000/health

            echo "Deploy completed"

      - name: Rollback hint
        if: failure()
        run: |
          echo "Deploy failed"
          echo "Run in VPS:"
          echo "cd /opt/tukifac"
          echo "bash deploy/scripts/rollback.sh"
